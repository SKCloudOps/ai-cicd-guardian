# Example: AI-Powered PR Code Review
# Add this to .github/workflows/ai-pr-review.yml

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    name: AI Code Review
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Review
        uses: SKCloudOps/ai-cicd-guardian@v1
        with:
          mode: 'pr-review'
          ai_provider: 'github-models'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          review_level: 'thorough'
          post_review_comment: 'true'
